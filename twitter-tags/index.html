<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>推特标签</title>
    <meta
      name="description"
      content="BPS 推特标签页：把常看的 X 标签按主题整理，点击标签直接跳到对应的实时搜索页。"
    />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="subpage-body">
    <main class="detail-shell">
      <header class="detail-header">
        <div>
          <a class="back-link" href="../">← 返回总控台</a>
          <h1>推特标签</h1>
          <p>先按主题筛，再点具体标签。每个标签都会直接打开对应的 X 实时搜索页。</p>
        </div>
        <div class="detail-stats">
          <span id="tag-count">0 个标签</span>
          <span id="group-count">0 个分组</span>
        </div>
      </header>

      <section class="detail-toolbar">
        <input id="tag-search" type="search" placeholder="搜索标签、分组、用途" />
        <div class="helper-copy">首版先收你常看的信号词，后面再接成可维护的标签清单。</div>
      </section>

      <div id="tag-groups" class="tag-groups"></div>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
