<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>脑波实验室</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-head">
        <div>
          <a class="back-link" href="../">← 返回总控台</a>
          <h1>脑波实验室</h1>
          <p>收拢你本地现有的全部频段与风格音轨，直接点播。</p>
        </div>
        <div class="head-stats">
          <span>29 条音轨</span>
          <span>6 个频段</span>
          <span>4 类风格</span>
        </div>
      </header>

      <section class="control-strip">
        <input id="search" type="search" placeholder="搜索频段、效果、标题" />
        <select id="band-filter">
          <option value="全部">全部频段</option>
          <option value="Delta">Delta</option>
          <option value="Theta">Theta</option>
          <option value="Alpha">Alpha</option>
          <option value="Beta">Beta</option>
          <option value="Gamma">Gamma</option>
          <option value="Solfeggio">Solfeggio</option>
        </select>
      </section>

      <section class="player-bar" id="player-bar">
        <div class="player-now">
          <strong id="player-title">未播放</strong>
          <span id="player-meta">请选择一条脑波音轨</span>
        </div>
        <div class="player-actions">
          <button id="toggle-play" type="button">播放</button>
          <label>
            音量
            <input id="volume" type="range" min="0" max="100" value="80" />
          </label>
        </div>
      </section>

      <div id="sections" class="sections"></div>
    </main>

    <audio id="audio" preload="metadata"></audio>
    <script src="./page.js" defer></script>
  </body>
</html>
