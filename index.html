<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPS 总控台</title>
    <meta
      name="description"
      content="BPS 总控台：高密度入口页，把专注、信号、分析、收入、监控和个人工具收口到一个页面。"
    />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=20260425d" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>BPS 总控台</h1>
          <p>高密度入口页，只做跳转，不做展开说明。</p>
        </div>

        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索入口、分类、标签" />
          <button id="show-pinned" type="button">只看置顶</button>
        </div>
      </header>

      <section id="brain-lab" class="brain-strip">
        <div class="brain-title">
          <strong>脑波音频</strong>
          <span id="audio-status">空闲</span>
        </div>
        <div class="brain-actions">
          <button class="tone-button" data-mode="alpha" type="button">Alpha</button>
          <button class="tone-button" data-mode="beta" type="button">Beta</button>
          <button class="tone-button" data-mode="theta" type="button">Theta</button>
          <button class="tone-button tone-stop" id="stop-audio" type="button">停止</button>
          <label class="volume-row" for="volume">
            <span>音量</span>
            <input id="volume" type="range" min="0" max="100" value="28" />
          </label>
        </div>
      </section>

      <section class="summary-row">
        <div class="summary-box">
          <span>总入口数</span>
          <strong id="module-count">0</strong>
        </div>
        <div class="summary-box">
          <span>已置顶</span>
          <strong id="pinned-count">0</strong>
        </div>
        <div class="summary-box">
          <span>说明</span>
          <strong>按钮越多越好</strong>
        </div>
      </section>

      <div id="sections" class="sections"></div>
    </main>

    <script src="/brain-waves/persistent-player.js?v=20260420d" defer></script>
    <script src="/app.js?v=20260425b" defer></script>
  </body>
</html>
